<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Wish</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;
background:url("bg.jpg") center/cover no-repeat;
}

.card{
width:92%;
max-width:380px;
background:#fff;
padding:30px 20px;
border-radius:25px;
text-align:center;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:active{
box-shadow:0 0 25px #ff4da6,0 0 60px #ff4da6;
transform:scale(1.02);
}

.card::before,
.card::after{
content:"";
width:18px;
height:18px;
border-radius:50%;
position:absolute;
border:3px solid #ff4da6;
}

.card::before{
top:10px;
left:10px;
}

.card::after{
bottom:10px;
right:10px;
}

.title{
font-family:"Dancing Script";
font-size:32px;
color:#ff4da6;
margin-bottom:10px;
}

.caption{
font-size:16px;
color:#444;
margin-bottom:20px;
min-height:90px;
white-space:pre-line;
}

input{
width:85%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
outline:none;
text-align:center;
margin-bottom:12px;
}

button{
padding:10px 25px;
border:none;
border-radius:12px;
background:#ff4da6;
color:white;
font-size:16px;
cursor:pointer;
}

/* social icons */

.social{
display:none;
margin-top:10px;
}

.social img{
width:38px;
margin:6px;
cursor:pointer;
transition:0.2s;
}

.social img:hover{
transform:scale(1.2);
}

.sparkle{
animation:spark 0.6s linear;
}

@keyframes spark{
0%{opacity:0.5;}
50%{opacity:1;}
100%{opacity:0.5;}
}

</style>
</head>

<body>

<div class="card" id="card">

<div class="title" id="title">
Eid Mubarak 🌙✨
</div>

<div class="caption" id="caption">
Type your name below 💫
</div>

<input type="text" id="nameInput" placeholder="Enter your name">

<br>

<button onclick="generateWish()">Generate Wish</button>

<!-- Social Links -->
<div class="social" id="socialLinks">

<a href="https://wa.me/8801770779852" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<a href="https://t.me/argent_imam" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<a href="https://facebook.com/argent.imam" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

</div>

</div>

<script>

let normalMessages=[

"May your life shine like the moon 🌙 and sparkle with happiness ✨",
"Wishing you joy, love and endless blessings 💖🌙",
"Stay happy and celebrate Eid with smiles 😊✨",
"May Allah accept all your prayers 🤲🌙",
"Sending warm wishes and sweet moments 💫💖",
"Hope your Eid is full of peace and success 🌙✨",
"Celebrate Eid with love and kindness 💞🌙",
"May this Eid bring new hope to your heart 🌟",
"Stay blessed and keep shining always ✨🌙",
"Enjoy this beautiful Eid with your family 👨‍👩‍👧‍👦🌙"

];

let nabihaMessages=[

"Eid Mubarak to my love ❤️\nmy heart, my best friend, my everything 🌙\nYou are my happiness, today and always ✨",

"Eid Mubarak to my love ❤️\nmy heart, my best friend, my everything 🌙✨\nYou make every moment of my life special 💫",

"Eid Mubarak to my love ❤️\nmy heart, my best friend, my everything 🌙",

"Eid Mubarak to my love ❤️\nmy heart, my best friend, my everything 🌙✨\nMay this Eid bring endless happiness to you and us 🤍"

];

function generateWish(){

let name=document.getElementById("nameInput").value.trim().toLowerCase();

if(name=="") return;

let titleText="";
let message="";

document.getElementById("socialLinks").style.display="none";

/* Nabiha */

if(name=="nabiha"){

titleText="Eid Mubarak Nabiha ❤️🌙";

message=nabihaMessages[Math.floor(Math.random()*nabihaMessages.length)];

}

/* Imam */

else if(name=="imam"){

titleText="Eid Mobarak To you 🌙";

message="আমাকে অন্য কোথাও ইউস করো বন্ধু 😛😜";

document.getElementById("socialLinks").style.display="block";

}

/* Others */

else{

titleText="Eid Mubarak "+name+" 🌙✨";

message=normalMessages[Math.floor(Math.random()*normalMessages.length)];

}

document.getElementById("title").innerHTML=titleText;
document.getElementById("caption").innerHTML=message;

let card=document.getElementById("card");

card.classList.add("sparkle");

setTimeout(()=>{
card.classList.remove("sparkle");
},600);

}

</script>

</body>
  </html>
