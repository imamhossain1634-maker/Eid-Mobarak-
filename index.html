<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Wish</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;

/* নিজের background image */
background:url("bg.jpg") center/cover no-repeat;
}

/* main card */

.card{

width:92%;
max-width:380px;

background:#fff;

padding:30px 20px;

border-radius:25px;

text-align:center;

position:relative;

box-shadow:0 15px 40px rgba(0,0,0,0.2);

transition:0.3s;
}

/* glow effect */

.card:active{

box-shadow:
0 0 25px #ff4da6,
0 0 60px #ff4da6;

transform:scale(1.02);
}

/* corner dots */

.card::before,
.card::after{

content:"";

width:18px;
height:18px;

border-radius:50%;

position:absolute;

border:3px solid #ff4da6;

}

.card::before{
top:10px;
left:10px;
}

.card::after{
bottom:10px;
right:10px;
}

/* title */

.title{

font-family:"Dancing Script";

font-size:32px;

color:#ff4da6;

margin-bottom:10px;

}

/* caption */

.caption{

font-size:16px;

color:#444;

margin-bottom:25px;

min-height:90px;

}

/* input */

input{

width:85%;

padding:12px;

border-radius:12px;

border:1px solid #ddd;

font-size:16px;

outline:none;

text-align:center;

margin-bottom:12px;

}

/* button */

button{

padding:10px 25px;

border:none;

border-radius:12px;

background:#ff4da6;

color:white;

font-size:16px;

cursor:pointer;

}

/* sparkle animation */

.sparkle{

animation:spark 0.6s linear;

}

@keyframes spark{

0%{opacity:0.5;}
50%{opacity:1;}
100%{opacity:0.5;}

}

</style>
</head>

<body>

<div class="card" id="card">

<div class="title" id="title">

Eid Mubarak 🌙✨

</div>

<div class="caption" id="caption">

Type your name below 💫

</div>

<input type="text" id="nameInput" placeholder="Enter your name">

<br>

<button onclick="generateWish()">

Generate Wish

</button>

</div>

<script>

let messages=[

"May your life shine like the moon 🌙 and sparkle with happiness ✨",

"Wishing you joy, love and endless blessings 💖🌙",

"Stay happy and celebrate Eid with smiles 😊✨",

"May Allah accept all your prayers 🤲🌙",

"Sending warm wishes and sweet moments 💫💖",

"Hope your Eid is full of peace and success 🌙✨",

"Celebrate Eid with love and kindness 💞🌙",

"May this Eid bring new hope to your heart 🌟",

"Stay blessed and keep shining always ✨🌙",

"Enjoy this beautiful Eid with your family 👨‍👩‍👧‍👦🌙"

];

function generateWish(){

let name=document.getElementById("nameInput").value;

if(name=="") return;

let randomMessage=

messages[Math.floor(Math.random()*messages.length)];

document.getElementById("title").innerHTML=

"Eid Mubarak "+name+" 🌙✨";

document.getElementById("caption").innerHTML=

randomMessage;

let card=document.getElementById("card");

card.classList.add("sparkle");

setTimeout(()=>{

card.classList.remove("sparkle");

},600);

}

</script>

</body>
</html>
